name: Build and Export IPA
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: macos-26
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: SPM 패키지 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            build/DerivedData/SourcePackages
          key: spm-${{ hashFiles('Atwy.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-

      - name: DerivedData 빌드 캐시
        uses: actions/cache@v4
        with:
          path: build/DerivedData/Build
          key: deriveddata-${{ runner.os }}-${{ hashFiles('Atwy.xcodeproj/project.pbxproj') }}-${{ github.sha }}
          restore-keys: |
            deriveddata-${{ runner.os }}-${{ hashFiles('Atwy.xcodeproj/project.pbxproj') }}-
            deriveddata-${{ runner.os }}-

      - name: Xcode 선택
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: 프로젝트 빌드 (서명 없이, 병렬 컴파일)
        run: |
          xcodebuild build \
            -project Atwy.xcodeproj \
            -scheme Atwy \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            -jobs $(sysctl -n hw.logicalcpu) \
            -parallelizeTargets \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: IPA 수동 생성
        run: |
          rm -rf Payload build/ipa
          mkdir -p build/ipa Payload
          cp -r build/DerivedData/Build/Products/Release-iphoneos/Atwy.app Payload/
          chmod -R 755 Payload/Atwy.app
          zip -r build/ipa/Atwy.ipa Payload

      - name: IPA 업로드
        uses: actions/upload-artifact@v4
        with:
          name: Atwy-ipa
          path: build/ipa/Atwy.ipa

      - name: 다운로드 링크 summary에 출력
        run: |
          echo "### 다운로드 링크" >> "$GITHUB_STEP_SUMMARY"
          echo "[Atwy.ipa 다운로드](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
